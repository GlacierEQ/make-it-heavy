# Make-It-Heavy read-only research configuration.
# Prefer setting OPENROUTER_API_KEY in the environment. Do not commit credentials.
openrouter:
  api_key: ""
  base_url: "https://openrouter.ai/api/v1"
  model: "openai/gpt-4.1-mini"
  request_timeout: 45

system_prompt: |
  You are a read-only research assistant. Separate sourced observations from
  allegations and model inferences. Cite sources and state uncertainty. You
  cannot take external actions, and every output remains pending human review.

tools:
  allowlist:
    - search_web
    - calculate
    - read_file
    - mark_task_complete
  mutation_enabled: false

apex_agents:
  - role: source_researcher
    model: "openai/gpt-4.1-mini"
    allowed_tools: [search_web, calculate, mark_task_complete]
    system_prompt: |
      Locate relevant sources and report what each source actually supports.
      Include URLs and publication dates when available. Label secondary sources,
      contradictions, and anything that could not be verified.

  - role: claim_auditor
    model: "anthropic/claude-3.5-sonnet"
    allowed_tools: [read_file, calculate, mark_task_complete]
    system_prompt: |
      Audit supplied material claim by claim. Distinguish direct evidence,
      reported allegations, model inference, and unsupported conclusion.
      Identify missing exhibit, page, timestamp, or source pointers.

  - role: counter_analyst
    model: "google/gemini-2.5-pro"
    allowed_tools: [search_web, read_file, calculate, mark_task_complete]
    system_prompt: |
      Test competing explanations and look for disconfirming evidence. Preserve
      uncertainty and disagreements. Never infer a legal conclusion from the
      repetition or emotional force of a claim.

  - role: review_planner
    model: "openai/gpt-4.1-mini"
    allowed_tools: [read_file, mark_task_complete]
    system_prompt: |
      Organize findings into reviewable, reversible next steps. Do not calculate
      legal deadlines, recommend filings as settled strategy, or take external
      action unless primary authority and a human decision are supplied.

agent:
  max_iterations: 10
  run_timeout: 150

orchestrator:
  parallel_agents: 4
  task_timeout: 180
  aggregation_strategy: consensus
  question_generation_prompt: |
    Decompose the following request into exactly {num_agents} independent,
    read-only research questions. Include source verification, claim auditing,
    counter-analysis, and review planning. Do not assume case facts or legal
    conclusions. Return only a JSON array of strings.

    Request: {user_input}

  synthesis_prompt: |
    Synthesize {num_responses} unreviewed worker outputs shown below.

    Preserve source links, disagreements, uncertainty, missing evidence, and
    contradictory accounts. Do not turn repeated allegations into facts. Label
    every unsupported conclusion as model inference. Do not invent probabilities,
    deadlines, legal conclusions, or automatic escalation steps. End with items
    requiring human review; take no external action.

    {agent_responses}

search:
  max_results: 5
  user_agent: "Make-It-Heavy/3.0 read-only research"
